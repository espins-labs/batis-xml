name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy", targets: "wasm32-unknown-unknown" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check --target wasm32-unknown-unknown   # wasm-clean gate (core crate only, see default-members)
      - run: cargo test
      # batis-xml-wasm: separate crate, wasm-bindgen lives only here --
      # the core crate's dependency purity above is unaffected by it.
      - run: cargo clippy -p batis-xml-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings
      - uses: taiki-e/install-action@wasm-pack
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
        working-directory: wasm
      # Drift gate: wasm/schema.d.ts is committed and hand-reviewed; this
      # fails if schema/batis-xml.v1.json changed without regenerating it.
      - name: Check wasm/schema.d.ts has no drift
        run: |
          npx --prefix wasm json2ts -i schema/batis-xml.v1.json -o /tmp/schema.d.ts --unreachableDefinitions
          diff wasm/schema.d.ts /tmp/schema.d.ts
      - run: ./wasm/build.sh
      - run: node wasm/tests/smoke.js

  test-matrix:
    strategy:
      matrix: { os: [macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "llvm-tools-preview" }
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # spec DoD: 90%+ line coverage (measured 94.89% at the pre-publish checklist)
      - run: cargo llvm-cov --all-features --fail-under-lines 90

  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: Swatinem/rust-cache@v2
      # Baseline: batis-xml 0.1.0 on crates.io (published 2026-07-05).
      - run: cargo semver-checks

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      # cargo-hack reads rust-version from Cargo.toml and runs the check
      # with that exact toolchain via rustup (core crate only, per
      # default-members -- the wasm crate's wasm-bindgen dependency isn't
      # part of this promise).
      - run: rustup toolchain install 1.79 --profile minimal
      - run: cargo hack check --rust-version

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - uses: Swatinem/rust-cache@v2
      # A10 (cold code review, publication blocker): RUSTSEC-2026-0194/
      # -0195 flagged quick-xml < 0.41 (fixed by the same commit that
      # bumped it here) -- blocking so a future dependency advisory
      # doesn't silently reach a release.
      - run: cargo audit
