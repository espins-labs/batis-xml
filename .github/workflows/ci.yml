name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy", targets: "wasm32-unknown-unknown" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check --target wasm32-unknown-unknown   # wasm-clean gate (core crate only, see default-members)
      - run: cargo test
      # batis-xml-wasm: separate crate, wasm-bindgen lives only here --
      # the core crate's dependency purity above is unaffected by it.
      - run: cargo clippy -p batis-xml-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings
      - uses: taiki-e/install-action@wasm-pack
      - run: wasm-pack build wasm --target nodejs
      - run: node wasm/tests/smoke.js

  test-matrix:
    strategy:
      matrix: { os: [macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "llvm-tools-preview" }
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # spec DoD: 90%+ line coverage (measured 94.89% at the pre-publish checklist)
      - run: cargo llvm-cov --all-features --fail-under-lines 90

  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: Swatinem/rust-cache@v2
      # No baseline exists on crates.io yet (pre-first-publish) -- this is
      # expected to fail with "no crate found" until 0.1.0 is published.
      # Remove continue-on-error at that point.
      - run: cargo semver-checks
        continue-on-error: true
