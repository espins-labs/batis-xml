name: release-plz

# Dormant until this repo is pushed to its GitHub remote and a
# CARGO_REGISTRY_TOKEN repo secret is set -- until then this workflow has
# nothing to release against and no token to publish with. See
# release-plz.toml for the single-crate config.
on:
  push:
    branches: [main]

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
