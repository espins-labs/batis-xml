# release-plz config. Two packages in this workspace: batis-xml is
# released to crates.io; batis-xml-wasm is distributed via npm
# (wasm-pack), so it is excluded from crates.io releases below
# (its Cargo.toml also sets publish = false).
#
# Dormant until: (1) this repo is pushed to its GitHub remote, and (2) a
# CARGO_REGISTRY_TOKEN repo secret is set. Until then release-plz.yml has
# nothing to open a release PR against and no token to publish with.
[workspace]
release = true
git_release_enable = true
changelog_update = true
semver_check = true

[[package]]
name = "batis-xml-wasm"
release = false
publish = false  # npm-only crate; Cargo.toml also says publish = false -- keep release-plz consistent
